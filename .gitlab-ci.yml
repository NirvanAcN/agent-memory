stages:
  - test

.test_template:
  stage: test
  before_script:
    - python --version
    - pip install -e ".[dev]"
  script:
    - ruff check .
    - python -m pytest scripts/test_memory.py -v
    - python scripts/bootstrap_memory.py --project-root "$CI_PROJECT_DIR/.ci-demo" --feature Demo --agents
    - python scripts/validate_memory.py --project-root "$CI_PROJECT_DIR/.ci-demo"

test:python3.9:
  extends: .test_template
  image: python:3.9-slim

test:python3.10:
  extends: .test_template
  image: python:3.10-slim

test:python3.11:
  extends: .test_template
  image: python:3.11-slim

test:python3.12:
  extends: .test_template
  image: python:3.12-slim
